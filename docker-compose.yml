services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp-analyzer-api
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: http://localhost:3000
      SESSION_TTL_SECONDS: 3600
      MAX_UPLOAD_MB: 50
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser calls the API on the host-mapped port
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: whatsapp-analyzer-web
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
